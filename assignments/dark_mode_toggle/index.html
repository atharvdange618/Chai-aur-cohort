<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/logo.svg" type="image/svg+xml" />
    <title>Dark Mode Toggle | Atharv Dange</title>
    <meta
      name="description"
      content="A neo-brutalist dark mode toggle demo by Atharv Dange."
    />
    <meta name="author" content="Atharv Dange" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header class="site-header">
        <h1>Dark Mode Toggle</h1>
        <button id="toggleBtn">
          <i class="fa-solid fa-moon"></i>
          <span>Dark Mode</span>
        </button>
      </header>

      <main>
        <div class="demo-card">
          <div class="card-label">PREVIEW CARD</div>
          <h2>The quick brown fox</h2>
          <p>
            This is a sample paragraph to demonstrate how text and background
            shift between light and dark modes. Every element adapts
            backgrounds, borders, shadows, and type.
          </p>
          <div class="card-tags">
            <span class="tag">JavaScript</span>
            <span class="tag">DOM</span>
            <span class="tag">CSS</span>
          </div>
        </div>
      </main>
    </div>

    <footer>
      <span
        >Built with <i class="fa-solid fa-heart"></i> by
        <strong>Atharv Dange</strong></span
      >
      <div class="footer-socials">
        <a
          href="https://twitter.com/atharvdangedev"
          target="_blank"
          rel="noopener noreferrer"
          class="social-link twitter"
        >
          <i class="fa-brands fa-x-twitter"></i> @atharvdangedev
        </a>
        <a
          href="https://github.com/atharvdange618"
          target="_blank"
          rel="noopener noreferrer"
          class="social-link github"
        >
          <i class="fa-brands fa-github"></i> @atharvdange618
        </a>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
